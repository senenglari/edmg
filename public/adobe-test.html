<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adobe PDF Tes</title>
</head>
<body>
  <div id="adobe-dc-view" style="height: 100vh;"></div>

  <script src="https://documentservices.adobe.com/view-sdk/viewer.js"></script>
  <script>
    document.addEventListener("adobe_dc_view_sdk.ready", () => {
      console.log('Adobe ready!');
      const adobeDCView = new AdobeDC.View({
        clientId: "6e754bf0041944e7b665e1d8c4b7f741",
        divId: "adobe-dc-view"
      });
      adobeDCView.previewFile({
        content: { location: { url: 'http://dzaries.my.id:8000/uploads/document/5/support.pdf' } },
        metaData: { fileName: "test.pdf", id: "test" }
      }, {
        embedMode: "FULL_WINDOW"
      }).then(() => console.log('Preview success!'))
       .catch(err => console.error('Preview error:', err));
    });
  </script>
</body>
</html>
